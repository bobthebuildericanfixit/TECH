<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fortnite OG Admin | Persistent v3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        :root {
            --fn-blue: #2183fb;
            --fn-yellow: #f8fd25;
            --fn-purple: #a136f1;
            --bg-gradient: radial-gradient(circle, #163a75 0%, #061021 100%);
            --slant: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        body {
            margin: 0; background: var(--bg-gradient); color: white;
            font-family: 'Anton', sans-serif; text-transform: uppercase;
        }

        /* Nav */
        header {
            background: rgba(0, 0, 0, 0.9); display: flex; padding: 10px 40px;
            border-bottom: 4px solid var(--fn-blue); gap: 15px;
        }
        .nav-tab {
            background: #313131; padding: 8px 35px; clip-path: var(--slant);
            cursor: pointer; border: none; color: #888;
        }
        .nav-tab.active { background: var(--fn-blue); color: white; }

        /* Main */
        .container { padding: 30px; }
        .admin-row { display: flex; gap: 20px; margin-bottom: 30px; }
        
        .btn-action {
            background: var(--fn-yellow); color: #000; padding: 12px 25px;
            clip-path: var(--slant); border: none; cursor: pointer; font-family: 'Anton';
        }

        /* Countdown Banner */
        #rotation-timer {
            background: var(--fn-purple); color: white; padding: 10px 20px;
            margin-bottom: 20px; display: none; clip-path: var(--slant);
            border-left: 10px solid white;
        }

        /* Grids */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; max-height: 65vh; overflow-y: auto;
        }
        .card { background: rgba(0,0,0,0.6); border: 2px solid var(--fn-blue); padding-bottom: 10px;}
        .card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 4px solid var(--fn-yellow); }
        .card-body { padding: 15px; }
        .card h3 { margin: 0; color: var(--fn-yellow); }
        .card p { font-family: sans-serif; text-transform: none; color: #ccc; font-size: 0.9rem; }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal { background: #12284c; border: 4px solid var(--fn-blue); width: 400px; padding: 25px; }
        input, select, textarea { width: 100%; margin: 10px 0; padding: 8px; background: #000; border: 1px solid var(--fn-blue); color: #fff; }
    </style>
</head>
<body>

<header>
    <button class="nav-tab active" onclick="switchTab('news')">News Feed</button>
    <button class="nav-tab" onclick="switchTab('shop')">Item Shop</button>
</header>

<div class="container">
    <div id="rotation-timer">
        ITEM SHOP ROTATION IN: <span id="timer-display">47:59:59</span>
    </div>

    <div class="admin-row">
        <button class="btn-action" onclick="showModal('newsModal')">Post News</button>
        <button class="btn-action" onclick="showModal('shopModal')">Queue Shop Item</button>
    </div>

    <div id="news-view" class="grid"></div>
    <div id="shop-view" class="grid" style="display:none;"></div>
</div>

<div id="newsModal" class="modal-overlay">
    <div class="modal">
        <h2>Post New MOTD</h2>
        <input type="text" id="n-title" placeholder="Title">
        <input type="text" id="n-img" placeholder="Image URL (e.g. https://placehold.co/600x400/000/fff?text=NEWS)">
        <textarea id="n-body" placeholder="Message content..."></textarea>
        <button class="btn-action" style="width:100%" onclick="addNews()">Publish News</button>
        <button onclick="hideModal('newsModal')" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer;">CANCEL</button>
    </div>
</div>

<div id="shopModal" class="modal-overlay">
    <div class="modal">
        <h2>Queue Shop Item</h2>
        <input type="text" id="s-name" placeholder="Item Name">
        <input type="text" id="s-img" placeholder="Item Icon URL">
        <select id="s-rarity">
            <option value="legendary">Legendary</option>
            <option value="epic">Epic</option>
            <option value="rare">Rare</option>
        </select>
        <button class="btn-action" style="width:100%" onclick="queueShop()">Confirm Rotation</button>
        <button hideModal('shopModal')" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer;">CANCEL</button>
    </div>
</div>

<script>
    let newsList = JSON.parse(localStorage.getItem('fn_news')) || [];
    let shopList = JSON.parse(localStorage.getItem('fn_shop')) || [];

    // --- Tab Logic ---
    function switchTab(tab) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('news-view').style.display = tab === 'news' ? 'grid' : 'none';
        document.getElementById('shop-view').style.display = tab === 'shop' ? 'grid' : 'none';
        renderAll();
    }

    // --- Modal Logic ---
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- News Logic ---
    function addNews() {
        const title = document.getElementById('n-title').value;
        const img = document.getElementById('n-img').value;
        const body = document.getElementById('n-body').value;

        if(!title || !img) return alert("Fill out title and image!");

        newsList.unshift({ title, img, body });
        localStorage.setItem('fn_news', JSON.stringify(newsList));
        renderAll();
        hideModal('newsModal');
    }

    // --- Shop Logic & Timer ---
    function queueShop() {
        const name = document.getElementById('s-name').value;
        const img = document.getElementById('s-img').value;
        const rarity = document.getElementById('s-rarity').value;

        shopList.push({ name, img, rarity });
        localStorage.setItem('fn_shop', JSON.stringify(shopList));
        
        // Start 48h Countdown
        const targetTime = new Date().getTime() + (48 * 60 * 60 * 1000);
        localStorage.setItem('rotation_end', targetTime);
        
        renderAll();
        startTimer();
        hideModal('shopModal');
    }

    function startTimer() {
        const endTime = localStorage.getItem('rotation_end');
        if (!endTime) return;

        document.getElementById('rotation-timer').style.display = 'block';

        const timerInterval = setInterval(() => {
            const now = new Date().getTime();
            const distance = endTime - now;

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById('timer-display').innerHTML = "DEPLOYED";
                return;
            }

            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('timer-display').innerHTML = 
                `${hours}H ${minutes}M ${seconds}S`;
        }, 1000);
    }

    // --- Rendering ---
    async function renderAll() {
        // News
        const newsContainer = document.getElementById('news-view');
        // Fetch real API news once, then prepend custom news
        if (newsList.length === 0 && newsContainer.innerHTML === "") {
            const res = await fetch('https://fortnite-api.com/v2/news/br');
            const data = await res.json();
            newsList = data.data.motds;
        }

        newsContainer.innerHTML = newsList.map(n => `
            <div class="card">
                <img src="${n.image || n.img}">
                <div class="card-body">
                    <h3>${n.title}</h3>
                    <p>${n.body}</p>
                </div>
            </div>
        `).join('');

        // Shop
        const shopContainer = document.getElementById('shop-view');
        shopContainer.innerHTML = shopList.map(s => `
            <div class="card">
                <img src="${s.img}">
                <div class="card-body">
                    <h3>${s.name}</h3>
                    <p style="color:var(--fn-blue)">QUEUED FOR ROTATION</p>
                </div>
            </div>
        `).join('') || "<h2>No items queued.</h2>";
    }

    // Init
    startTimer();
    renderAll();
</script>

</body>
</html>
