<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Admin Panel | Fortnite Clone</title>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --accent: #25bcff;
            --text-main: #ffffff;
            --text-dim: #888;
            --rarity-common: #bebebe;
            --rarity-rare: #27a2eb;
            --rarity-epic: #b046e4;
            --rarity-legendary: #d37841;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Navigation */
        aside { width: 260px; background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 40px; color: var(--accent); }
        nav button { background: none; border: none; color: var(--text-dim); text-align: left; padding: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; border-radius: 4px; }
        nav button:hover, nav button.active { color: #fff; background: #222; }

        /* Main Content Area */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Item Grid Styling */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border-radius: 8px; padding: 10px; border: 1px solid #333; text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; border-radius: 4px; margin-bottom: 10px; background: #121212; }
        .card h4 { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-top: 5px; }

        /* Status Pills */
        .status { font-size: 0.8rem; background: #1a3a2a; color: #4caf50; padding: 4px 12px; border-radius: 20px; border: 1px solid #4caf50; }
        
        /* Loading Spinner */
        .loader { border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 100px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<aside>
    <div class="logo">EPIC_ADMIN // V1</div>
    <nav style="display: flex; flex-direction: column; gap: 10px;">
        <button class="active" onclick="loadContent('shop')">LIVE ITEM SHOP</button>
        <button onclick="loadContent('items')">ITEM REGISTRY</button>
        <button onclick="loadContent('news')">IN-GAME NEWS</button>
    </nav>
</aside>

<main id="main-view">
    <div class="header">
        <h1 id="view-title">Live Item Shop</h1>
        <div class="status">SYSTEMS NOMINAL</div>
    </div>
    <div id="content-output">
        </div>
</main>

<script>
    const output = document.getElementById('content-output');
    const title = document.getElementById('view-title');

    async function loadContent(view) {
        output.innerHTML = '<div class="loader"></div>';
        
        // Update Active States
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        event?.target.classList.add('active');

        try {
            if (view === 'shop') {
                title.innerText = "Current Live Shop";
                const res = await fetch('https://fortnite-api.com/v2/shop/br');
                const data = await res.json();
                renderItems(data.data.featured.entries.flatMap(e => e.items));
            } 
            else if (view === 'items') {
                title.innerText = "Global Item Registry (Last 50)";
                const res = await fetch('https://fortnite-api.com/v2/cosmetics/br/new');
                const data = await res.json();
                renderItems(data.data.items);
            }
            else if (view === 'news') {
                title.innerText = "Battle Royale News";
                const res = await fetch('https://fortnite-api.com/v2/news/br');
                const data = await res.json();
                renderNews(data.data.motds);
            }
        } catch (err) {
            output.innerHTML = `<p style="color: red;">Error fetching data: ${err.message}</p>`;
        }
    }

    function renderItems(items) {
        let html = '<div class="grid">';
        items.forEach(item => {
            html += `
                <div class="card">
                    <img src="${item.images.smallIcon || item.images.icon}" alt="${item.name}">
                    <h4>${item.name}</h4>
                    <p style="color: var(--rarity-${item.rarity.value.toLowerCase()})">${item.rarity.value}</p>
                </div>
            `;
        });
        html += '</div>';
        output.innerHTML = html;
    }

    function renderNews(newsItems) {
        let html = '<div style="display: flex; flex-direction: column; gap: 20px;">';
        newsItems.forEach(news => {
            html += `
                <div style="background: var(--surface); border-radius: 12px; overflow: hidden; display: flex;">
                    <img src="${news.image}" style="width: 300px; object-fit: cover;">
                    <div style="padding: 20px;">
                        <h3>${news.title}</h3>
                        <p style="color: var(--text-dim); margin-top: 10px;">${news.body}</p>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        output.innerHTML = html;
    }

    // Initial Load
    loadContent('shop');
</script>

</body>
</html>
