<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fortnite Admin | DEV LOCKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        :root {
            --fn-blue: #2183fb;
            --fn-yellow: #f8fd25;
            --fn-purple: #a136f1;
            --fn-dark: #061021;
            --slant: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        body {
            margin: 0; background: radial-gradient(circle, #163a75 0%, var(--fn-dark) 100%);
            color: white; font-family: 'Anton', sans-serif; text-transform: uppercase;
            height: 100vh; overflow: hidden;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.9); display: flex; align-items: center;
            padding: 0 40px; border-bottom: 4px solid var(--fn-blue); height: 70px;
            justify-content: space-between;
        }
        .nav-group { display: flex; gap: 10px; }
        .nav-tab {
            background: #313131; padding: 8px 30px; clip-path: var(--slant);
            cursor: pointer; border: none; color: #888; font-family: 'Anton';
        }
        .nav-tab.active { background: var(--fn-blue); color: white; }

        .account-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 5px 15px;
            border-left: 4px solid var(--fn-yellow);
        }

        /* Dev Locker Controls */
        .container { padding: 25px; }
        
        .locker-controls {
            display: flex; gap: 15px; align-items: center;
            background: rgba(0,0,0,0.4); padding: 15px; margin-bottom: 20px;
            border: 1px solid var(--fn-blue);
        }

        input[type="text"] {
            background: #000; border: 1px solid var(--fn-blue); color: white;
            padding: 10px; flex-grow: 1; font-family: sans-serif;
        }

        .btn-grant {
            background: var(--fn-yellow); color: #000; padding: 10px 25px;
            clip-path: var(--slant); border: none; cursor: pointer; font-family: 'Anton';
        }

        /* Item Grid */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; max-height: 70vh; overflow-y: auto; padding-bottom: 50px;
        }
        .item-card {
            background: rgba(0,0,0,0.8); border: 2px solid #333;
            transition: 0.2s; cursor: pointer; position: relative;
        }
        .item-card:hover { border-color: var(--fn-yellow); transform: scale(1.02); }
        .item-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111; }
        .item-card.granted { border-color: var(--fn-purple); }
        .item-card.granted::after {
            content: "GRANTED"; position: absolute; top: 5px; right: 5px;
            background: var(--fn-purple); font-size: 0.6rem; padding: 2px 5px;
        }
        .item-info { padding: 8px; font-size: 0.8rem; text-align: center; }

        #loading-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; color: var(--fn-yellow); display: none;
        }
    </style>
</head>
<body>

<header>
    <div class="nav-group">
        <div style="font-size: 1.5rem; margin-right: 20px; color: var(--fn-blue);">EPIC_INTERNAL</div>
        <button class="nav-tab active" onclick="switchTab('news')">News Feed</button>
        <button class="nav-tab" onclick="switchTab('locker')">DEV LOCKER</button>
    </div>
    
    <div class="account-badge">
        <div style="width: 8px; height: 8px; background: #4caf50; border-radius: 50%;"></div>
        <div>
            <div style="font-size: 0.7rem; color: #aaa;">LOCKER TARGET:</div>
            <div style="font-size: 1rem;">DEV_DEBUG_USER</div>
        </div>
    </div>
</header>

<div class="container">
    <div id="news-view" class="grid">
        </div>

    <div id="locker-view" style="display:none;">
        <div class="locker-controls">
            <input type="text" id="locker-search" placeholder="SEARCH ASSET REGISTRY (e.g. Renegade Raider, Midas...)" onkeyup="filterLocker()">
            <div style="color: var(--fn-yellow); font-size: 0.8rem; margin: 0 10px;">
                TOTAL ASSETS: <span id="asset-count">0</span>
            </div>
        </div>
        <div id="locker-grid" class="grid"></div>
    </div>
</div>

<div id="loading-overlay">SYNCHRONIZING ASSETS...</div>

<script>
    let allAssets = [];
    let grantedIds = JSON.parse(localStorage.getItem('granted_items')) || [];

    function switchTab(tab) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('news-view').style.display = tab === 'news' ? 'grid' : 'none';
        document.getElementById('locker-view').style.display = tab === 'locker' ? 'block' : 'none';

        if(tab === 'locker' && allAssets.length === 0) fetchAllAssets();
    }

    // Load News
    async function loadNews() {
        const res = await fetch('https://fortnite-api.com/v2/news/br');
        const data = await res.json();
        document.getElementById('news-view').innerHTML = data.data.motds.map(n => `
            <div class="item-card" style="width:100%; cursor:default;">
                <img src="${n.image}" style="aspect-ratio:16/9">
                <div class="item-info"><h3>${n.title}</h3></div>
            </div>
        `).join('');
    }

    // Load All Items for Dev Locker
    async function fetchAllAssets() {
        document.getElementById('loading-overlay').style.display = 'block';
        try {
            const res = await fetch('https://fortnite-api.com/v2/cosmetics/br');
            const json = await res.json();
            allAssets = json.data;
            document.getElementById('asset-count').innerText = allAssets.length;
            renderLocker(allAssets.slice(0, 100)); // Show first 100 initially
        } catch (e) {
            console.error("Failed to fetch assets");
        }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function renderLocker(items) {
        const grid = document.getElementById('locker-grid');
        grid.innerHTML = items.map(item => {
            const isGranted = grantedIds.includes(item.id);
            return `
                <div class="item-card ${isGranted ? 'granted' : ''}" onclick="grantItem('${item.id}', '${item.name}')">
                    <img src="${item.images.icon || item.images.smallIcon}" loading="lazy">
                    <div class="item-info">
                        <div style="font-size:0.7rem; color:var(--fn-blue)">${item.type.value}</div>
                        <div>${item.name}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterLocker() {
        const term = document.getElementById('locker-search').value.toLowerCase();
        const filtered = allAssets.filter(a => a.name.toLowerCase().includes(term)).slice(0, 100);
        renderLocker(filtered);
    }

    function grantItem(id, name) {
        if(grantedIds.includes(id)) {
            alert(`ASSET REVOKED: ${name} removed from Dev Account.`);
            grantedIds = grantedIds.filter(i => i !== id);
        } else {
            alert(`ASSET GRANTED: ${name} pushed to DEV_DEBUG_USER. Please restart game client.`);
            grantedIds.push(id);
        }
        localStorage.setItem('granted_items', JSON.stringify(grantedIds));
        filterLocker(); // Refresh display
    }

    // Init
    loadNews();
</script>

</body>
</html>
