<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fortnite OG | Admin Command Center</title>
    <style>
        :root {
            --fortnite-yellow: #f8fd25;
            --fortnite-blue: #2183fb;
            --fortnite-dark-blue: #12284c;
            --og-gradient: linear-gradient(180deg, #163a75 0%, #0d1e3d 100%);
            --button-slant: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        body {
            margin: 0;
            font-family: "Arial Black", sans-serif;
            background: var(--og-gradient);
            color: white;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* OG Top Navigation */
        header {
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            padding: 10px 50px;
            gap: 20px;
            border-bottom: 3px solid var(--fortnite-blue);
        }

        .nav-btn {
            background: #333;
            padding: 10px 30px;
            clip-path: var(--button-slant);
            cursor: pointer;
            border: none;
            color: #ccc;
            font-weight: bold;
            transition: 0.2s;
        }

        .nav-btn.active {
            background: var(--fortnite-blue);
            color: white;
            transform: scale(1.1);
        }

        /* Main Content Area */
        main {
            padding: 40px;
            height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .admin-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .action-btn {
            background: var(--fortnite-yellow);
            color: black;
            padding: 15px 30px;
            border: none;
            font-weight: 900;
            clip-path: var(--button-slant);
            cursor: pointer;
        }

        /* News Cards */
        .news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--fortnite-blue);
            padding: 15px;
            position: relative;
        }

        .news-card img { width: 100%; border-bottom: 4px solid var(--fortnite-yellow); }

        /* Modal Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: var(--fortnite-dark-blue);
            border: 4px solid var(--fortnite-yellow);
            padding: 30px;
            width: 500px;
            position: relative;
        }

        .modal h2 { color: var(--fortnite-yellow); margin-bottom: 20px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--fortnite-blue);
            color: white;
        }

        .close-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; color: red; }
    </style>
</head>
<body>

<header>
    <button class="nav-btn active" onclick="loadNews()">NEWS FEED</button>
    <button class="nav-btn" onclick="alert('Item Registry requires Local Storage access')">ITEM REGISTRY</button>
</header>

<main>
    <div class="admin-controls">
        <button class="action-btn" onclick="openModal('shopModal')">UPDATE ITEM SHOP</button>
        <button class="action-btn" onclick="openModal('newsModal')">POST NEWS</button>
    </div>

    <div id="display-area">
        </div>
</main>

<div id="newsModal" class="overlay">
    <div class="modal">
        <span class="close-btn" onclick="closeModal('newsModal')">X CLOSE</span>
        <h2>POST NEW ADVISORY</h2>
        <input type="text" placeholder="NEWS TITLE (e.g. TILTED TOWERS UNDER ATTACK)">
        <textarea rows="4" placeholder="BODY TEXT..."></textarea>
        <input type="text" placeholder="IMAGE URL (PNG/JPG)">
        <button class="action-btn" onclick="confirmAction('News published to staging!')" style="width:100%">PUSH TO SERVERS</button>
    </div>
</div>

<div id="shopModal" class="overlay">
    <div class="modal">
        <span class="close-btn" onclick="closeModal('shopModal')">X CLOSE</span>
        <h2>SHOP OVERRIDE</h2>
        <label>SELECT RARITY</label>
        <select>
            <option>LEGENDARY (2000 V-BUCKS)</option>
            <option>EPIC (1500 V-BUCKS)</option>
            <option>RARE (1200 V-BUCKS)</option>
        </select>
        <input type="text" placeholder="ITEM ID (e.g. CID_001_Athena_Commando_F_Default)">
        <input type="number" placeholder="V-BUCKS PRICE">
        <button class="action-btn" onclick="confirmAction('Adding in 48 hours')" style="width:100%">CONFIRM CHANGES</button>
    </div>
</div>

<script>
    // Fetch News (The only active API part)
    async function loadNews() {
        const display = document.getElementById('display-area');
        display.innerHTML = "<h2>RETRIEVING ENCRYPTED DATA...</h2>";
        
        try {
            const res = await fetch('https://fortnite-api.com/v2/news/br');
            const json = await res.json();
            const news = json.data.motds;

            let html = '<div class="news-container">';
            news.forEach(item => {
                html += `
                    <div class="news-card">
                        <img src="${item.image}">
                        <h3>${item.title}</h3>
                        <p style="text-transform: none; color: #aaa;">${item.body}</p>
                    </div>
                `;
            });
            html += '</div>';
            display.innerHTML = html;
        } catch (e) {
            display.innerHTML = "OFFLINE: COULD NOT CONNECT TO EPICGAMES_INTERNALSERV88;
        }
    }

    // Modal Logic
    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function confirmAction(message) {
        alert("COMMAND ACCEPTED: " + message);
        document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
    }

    // Initial load
    loadNews();
</script>

</body>
</html>
