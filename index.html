<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPIC_INTERNAL // V7_ADMIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        :root {
            --fn-blue: #2183fb;
            --fn-yellow: #f8fd25;
            --fn-red: #ff4141;
            --fn-purple: #a136f1;
            --slant: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        body {
            margin: 0; background: radial-gradient(circle, #163a75 0%, #061021 100%);
            color: white; font-family: 'Anton', sans-serif; text-transform: uppercase;
            height: 100vh; overflow: hidden;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.95); display: flex; align-items: center;
            padding: 0 40px; border-bottom: 4px solid var(--fn-blue); height: 60px;
            justify-content: space-between;
        }
        .nav-tab {
            background: #313131; padding: 5px 20px; clip-path: var(--slant);
            cursor: pointer; border: none; color: #888; font-family: 'Anton'; margin: 0 2px;
        }
        .nav-tab.active { background: var(--fn-blue); color: white; }

        .container { padding: 20px; height: calc(100vh - 100px); overflow: hidden; }

        /* Report Feed */
        .report-feed {
            background: rgba(0,0,0,0.8); border: 2px solid var(--fn-red);
            height: 80%; overflow-y: auto; padding: 10px;
        }
        .report-entry {
            display: grid; grid-template-columns: 1fr 2fr 1fr 2fr;
            background: #1a1a1a; margin-bottom: 5px; padding: 12px;
            border-left: 5px solid var(--fn-red); align-items: center;
        }

        /* Map & Grid */
        .map-frame { width: 100%; height: 80vh; border: 4px solid var(--fn-blue); background: #000; display: flex; justify-content: center; overflow: hidden; }
        .map-frame img { height: 100%; object-fit: contain; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px; max-height: 75vh; overflow-y: auto;
        }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: #12284c; border: 4px solid var(--fn-blue); width: 400px; padding: 25px; }

        input, select { width: 100%; margin: 8px 0; padding: 10px; background: #000; border: 1px solid var(--fn-blue); color: #fff; }

        .btn-action { background: var(--fn-yellow); color: #000; padding: 8px 15px; clip-path: var(--slant); border: none; cursor: pointer; font-family: 'Anton'; }
        .btn-red { background: var(--fn-red); color: white; }
        .btn-purple { background: var(--fn-purple); color: white; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <button class="nav-tab active" onclick="switchTab('reports')">Reports</button>
        <button class="nav-tab" onclick="switchTab('map')">Map</button>
        <button class="nav-tab" onclick="switchTab('tournaments')">Tournaments</button>
        <button class="nav-tab" onclick="switchTab('locker')">Dev Locker</button>
    </div>
    <div style="text-align: right;">
        <button class="btn-action" style="background:#555; color:#fff" onclick="undoLast()">UNDO ACTION</button>
        <span style="margin-left: 20px; font-size: 0.8rem;">V7.00_INTERNAL</span>
    </div>
</header>

<div class="container">
    <div id="view-reports">
        <h2 style="color:var(--fn-red)">Live Infraction Feed (Auto-Syncing)</h2>
        <div class="report-feed" id="report-container"></div>
    </div>

    <div id="view-map" style="display:none;">
        <div class="map-frame"><img id="map-img" src="" alt="Loading Map..."></div>
    </div>

    <div id="view-tournaments" style="display:none;">
        <div style="margin-bottom: 20px;">
            <button class="btn-action" onclick="showModal('tourneyModal')">ADD NEW TOURNAMENT</button>
        </div>
        <div class="grid" id="tourney-grid"></div>
    </div>

    <div id="view-locker" style="display:none;">
        <h2 style="color:var(--fn-yellow)">Asset Registry Overlay</h2>
        <div class="grid" id="locker-grid"></div>
    </div>
</div>

<div id="banModal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="ban-title">Account Action</h2>
        <label>Duration (Hours)</label>
        <input type="number" id="ban-hours" value="24">
        <button id="ban-confirm-btn" class="btn-action btn-red" style="width:100%">EXECUTE BAN</button>
        <button onclick="hideModal('banModal')" style="color:#aaa; background:none; border:none; margin-top:10px; width:100%; cursor:pointer;">CANCEL</button>
    </div>
</div>

<div id="tourneyModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Schedule Tournament</h2>
        <input type="text" id="t-name" placeholder="Tournament Name">
        <input type="text" id="t-prize" placeholder="Prize Pool (e.g. $1,000,000)">
        <select id="t-region"><option>NA-EAST</option><option>EUROPE</option><option>ASIA</option></select>
        <button class="btn-action" style="width:100%" onclick="addTournament()">PUBLISH TO COMPETITIVE TAB</button>
        <button onclick="hideModal('tourneyModal')" style="color:#aaa; background:none; border:none; margin-top:10px; width:100%; cursor:pointer;">CANCEL</button>
    </div>
</div>

<script>
    // --- Data Persistence ---
    let reports = JSON.parse(localStorage.getItem('admin_reports')) || [];
    let tourneys = JSON.parse(localStorage.getItem('admin_tourneys')) || [];
    let history = []; // For Undo

    const fakeNames = ["Tfue_Fan_01", "Renegade_OG", "Siphon_Enjoyer", "BoxFighter_99", "BushCamper", "StormRunner"];

    // --- Tab System ---
    function switchTab(v) {
        ['reports','map','tournaments','locker'].forEach(t => {
            document.getElementById('view-'+t).style.display = (t === v) ? 'block' : 'none';
        });
        document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if(v === 'map') loadMap();
        renderAll();
    }

    // --- Reports & Ban System ---
    function syncReports() {
        if(Math.random() > 0.7) { // Random sync chance
            const newReport = {
                id: Date.now(),
                target: fakeNames[Math.floor(Math.random()*fakeNames.length)] + "_" + Math.floor(Math.random()*99),
                reason: ["Aimbot", "Wallhack", "Toxic", "Teaming"][Math.floor(Math.random()*4)]
            };
            reports.unshift(newReport);
            saveData();
            renderAll();
        }
        setTimeout(syncReports, Math.random() * 15000); // Random interval
    }

    function openBanModal(type, target, id) {
        document.getElementById('ban-title').innerText = `${type} BAN: ${target}`;
        const btn = document.getElementById('ban-confirm-btn');
        btn.className = type === 'SOCIAL' ? 'btn-action btn-purple' : 'btn-action btn-red';
        btn.onclick = () => executeBan(id, type);
        showModal('banModal');
    }

    function executeBan(id, type) {
        const hours = document.getElementById('ban-hours').value;
        const index = reports.findIndex(r => r.id === id);
        if(index > -1) {
            history.push({type: 'delete', data: reports[index], index: index}); // For Undo
            reports.splice(index, 1);
            alert(`SUCCESS: User issued ${hours}h ${type} Ban.`);
            saveData();
            renderAll();
            hideModal('banModal');
        }
    }

    function undoLast() {
        if(history.length === 0) return alert("Nothing to undo!");
        const last = history.pop();
        reports.splice(last.index, 0, last.data);
        saveData();
        renderAll();
    }

    // --- Tournament System ---
    function addTournament() {
        const name = document.getElementById('t-name').value;
        const prize = document.getElementById('t-prize').value;
        if(!name) return;
        tourneys.unshift({ name, prize, region: document.getElementById('t-region').value });
        saveData();
        renderAll();
        hideModal('tourneyModal');
    }

    // --- Map Logic ---
    async function loadMap() {
        const res = await fetch('https://fortnite-api.com/v1/map');
        const data = await res.json();
        document.getElementById('map-img').src = data.data.images.blank;
    }

    // --- Renderers ---
    function renderAll() {
        // Reports
        document.getElementById('report-container').innerHTML = reports.map(r => `
            <div class="report-entry">
                <span style="color:#888">#${r.id.toString().slice(-5)}</span>
                <span>${r.target}</span>
                <span style="color:var(--fn-red)">${r.reason}</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-action" onclick="openBanModal('NORMAL', '${r.target}', ${r.id})">BAN</button>
                    <button class="btn-action btn-purple" onclick="openBanModal('SOCIAL', '${r.target}', ${r.id})">SOCIAL BAN</button>
                </div>
            </div>
        `).join('');

        // Tourneys
        document.getElementById('tourney-grid').innerHTML = tourneys.map(t => `
            <div style="background:#000; border:2px solid var(--fn-blue); padding:15px;">
                <h3 style="color:var(--fn-yellow)">${t.name}</h3>
                <p>PRIZE: ${t.prize}</p>
                <p style="color:var(--fn-blue)">REGION: ${t.region}</p>
            </div>
        `).join('');
    }

    function saveData() {
        localStorage.setItem('admin_reports', JSON.stringify(reports));
        localStorage.setItem('admin_tourneys', JSON.stringify(tourneys));
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }

    // Init
    syncReports();
    renderAll();
</script>

</body>
</html>
