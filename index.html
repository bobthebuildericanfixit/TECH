<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPIC_INTERNAL // V8_ADMIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        :root {
            --fn-blue: #2183fb;
            --fn-yellow: #f8fd25;
            --fn-red: #ff4141;
            --fn-purple: #a136f1;
            --slant: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        body {
            margin: 0; background: radial-gradient(circle, #163a75 0%, #061021 100%);
            color: white; font-family: 'Anton', sans-serif; text-transform: uppercase;
            height: 100vh; overflow: hidden;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.95); display: flex; align-items: center;
            padding: 0 40px; border-bottom: 4px solid var(--fn-blue); height: 60px;
            justify-content: space-between;
        }
        .nav-tab {
            background: #313131; padding: 5px 20px; clip-path: var(--slant);
            cursor: pointer; border: none; color: #888; font-family: 'Anton'; margin: 0 2px;
        }
        .nav-tab.active { background: var(--fn-blue); color: white; }

        .container { padding: 20px; height: calc(100vh - 80px); }

        /* Reports Section */
        .report-feed {
            background: rgba(0,0,0,0.85); border: 2px solid var(--fn-red);
            height: 70vh; overflow-y: auto; padding: 10px;
        }
        .report-entry {
            display: grid; grid-template-columns: 100px 1fr 1fr 200px;
            background: #111; margin-bottom: 4px; padding: 10px;
            border-left: 4px solid var(--fn-red); align-items: center; font-size: 0.9rem;
        }

        /* Map Zoom Logic */
        .map-container { 
            width: 100%; height: 75vh; border: 3px solid var(--fn-blue); 
            overflow: hidden; position: relative; cursor: grab; background: #000;
        }
        #map-img { 
            width: 100%; transition: transform 0.2s ease; transform-origin: center;
        }

        /* Dev Locker Fix */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px; max-height: 75vh; overflow-y: auto;
        }
        .asset-card { background: #000; border: 1px solid #333; text-align: center; font-size: 0.7rem; }
        .asset-card img { width: 100%; background: #111; }

        /* Buttons */
        .btn-action { background: var(--fn-yellow); color: #000; padding: 6px 12px; clip-path: var(--slant); border: none; cursor: pointer; font-family: 'Anton'; }
        .btn-purple { background: var(--fn-purple); color: white; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: #12284c; border: 4px solid var(--fn-blue); width: 400px; padding: 20px; }
        input { width: 100%; margin: 10px 0; padding: 8px; background: #000; color: #fff; border: 1px solid var(--fn-blue); }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <button class="nav-tab active" onclick="switchTab('reports')">Live Reports</button>
        <button class="nav-tab" onclick="switchTab('map')">Tactical Map</button>
        <button class="nav-tab" onclick="switchTab('tournaments')">Tournaments</button>
        <button class="nav-tab" onclick="switchTab('locker')">Dev Locker</button>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div id="live-indicator" style="color: #4caf50; font-size: 0.8rem;">● CONNECTION STABLE</div>
    </div>
</header>

<div class="container">
    <div id="view-reports">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="color:var(--fn-red)">Incoming Reports Queue</h2>
            <button class="btn-action" style="background:#555; color:white" onclick="undoLast()">UNDO LAST ACTION</button>
        </div>
        <div class="report-feed" id="report-container"></div>
    </div>

    <div id="view-map" style="display:none; text-align: center;">
        <p>Use Mouse Wheel to Zoom | Click & Drag to view locations</p>
        <div class="map-container" id="map-cont" onwheel="zoomMap(event)">
            <img id="map-img" src="" alt="Syncing Map...">
        </div>
    </div>

    <div id="view-tournaments" style="display:none;">
        <button class="btn-action" style="margin-bottom:15px;" onclick="showModal('tourneyModal')">Create Tournament</button>
        <div class="grid" id="tourney-grid"></div>
    </div>

    <div id="view-locker" style="display:none;">
        <div style="margin-bottom:10px;">
            <input type="text" id="locker-search" placeholder="Search Skins, Pickaxes..." onkeyup="searchAssets()" style="width:300px">
        </div>
        <div class="grid" id="locker-grid"></div>
    </div>
</div>

<div id="banModal" class="modal-overlay">
    <div class="modal">
        <h2 id="ban-target-name">Target: User</h2>
        <input type="number" id="ban-qty" value="24" placeholder="Duration (Hours)">
        <button id="ban-execute" class="btn-action" style="width:100%">Execute Action</button>
        <button onclick="hideModal('banModal')" style="background:none; color:red; border:none; width:100%; margin-top:10px; cursor:pointer;">ABORT</button>
    </div>
</div>

<div id="tourneyModal" class="modal-overlay">
    <div class="modal">
        <h2>New Competition</h2>
        <input type="text" id="t-name" placeholder="Name">
        <input type="text" id="t-img" placeholder="Image URL">
        <button class="btn-action" style="width:100%" onclick="addTournament()">Publish Tournament</button>
        <button onclick="hideModal('tourneyModal')" style="background:none; color:red; border:none; width:100%; margin-top:10px; cursor:pointer;">ABORT</button>
    </div>
</div>

<script>
    let reports = JSON.parse(localStorage.getItem('fn_v8_reports')) || [];
    let customTourneys = JSON.parse(localStorage.getItem('fn_v8_tourneys')) || [];
    let allAssets = [];
    let history = [];
    let mapScale = 1;

    const sweatyNames = ["v_Shifted", "TZ_Ryz", "Not_Aqua", "Parallel_F8", "Cold.fn", "Lxsh.cc", "Snypr", "Faded_77", "Clix_Fan_8", "v_Dusk"];

    // --- Tab Switcher ---
    function switchTab(v) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        ['reports','map','tournaments','locker'].forEach(id => {
            document.getElementById('view-'+id).style.display = (id === v) ? 'block' : 'none';
        });
        if(v === 'map') loadMap();
        if(v === 'locker' && allAssets.length === 0) fetchLocker();
        if(v === 'tournaments') loadTournaments();
    }

    // --- High Frequency Reports ---
    function generateReport() {
        const name = sweatyNames[Math.floor(Math.random() * sweatyNames.length)] + "_" + Math.floor(Math.random() * 99);
        const report = {
            id: Date.now(),
            user: name,
            reason: ["Aimbot", "Wallhack", "Teaming", "Griefing"][Math.floor(Math.random()*4)],
            time: new Date().toLocaleTimeString()
        };
        reports.unshift(report);
        if(reports.length > 50) reports.pop();
        localStorage.setItem('fn_v8_reports', JSON.stringify(reports));
        renderReports();
        
        // Consistent speed: 1-5 seconds
        setTimeout(generateReport, Math.random() * 4000 + 1000);
    }

    function renderReports() {
        const cont = document.getElementById('report-container');
        cont.innerHTML = reports.map(r => `
            <div class="report-entry">
                <span style="color:#666">${r.time}</span>
                <span style="color:var(--fn-yellow)">${r.user}</span>
                <span style="color:var(--fn-red)">${r.reason}</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-action" onclick="prepBan('${r.user}', ${r.id}, 'GAME')">BAN</button>
                    <button class="btn-action btn-purple" onclick="prepBan('${r.user}', ${r.id}, 'SOCIAL')">SOC</button>
                </div>
            </div>
        `).join('');
    }

    function prepBan(user, id, type) {
        document.getElementById('ban-target-name').innerText = `${type} BAN: ${user}`;
        document.getElementById('ban-execute').onclick = () => executeBan(id, type);
        showModal('banModal');
    }

    function executeBan(id, type) {
        const idx = reports.findIndex(r => r.id === id);
        if(idx > -1) {
            history.push({index: idx, data: reports[idx]});
            reports.splice(idx, 1);
            localStorage.setItem('fn_v8_reports', JSON.stringify(reports));
            renderReports();
            hideModal('banModal');
        }
    }

    function undoLast() {
        if(history.length === 0) return;
        const item = history.pop();
        reports.splice(item.index, 0, item.data);
        renderReports();
    }

    // --- Zoomable Map ---
    async function loadMap() {
        const res = await fetch('https://fortnite-api.com/v1/map');
        const data = await res.json();
        document.getElementById('map-img').src = data.data.images.pois; // POI map has names
    }

    function zoomMap(e) {
        e.preventDefault();
        mapScale += e.deltaY * -0.001;
        mapScale = Math.min(Math.max(1, mapScale), 4);
        document.getElementById('map-img').style.transform = `scale(${mapScale})`;
    }

    // --- Dev Locker Fix ---
    async function fetchLocker() {
        const res = await fetch('https://fortnite-api.com/v2/cosmetics/br');
        const json = await res.json();
        allAssets = json.data;
        renderLocker(allAssets.slice(0, 50));
    }

    function renderLocker(items) {
        const grid = document.getElementById('locker-grid');
        grid.innerHTML = items.map(item => `
            <div class="asset-card">
                <img src="${item.images.icon}" loading="lazy">
                <p>${item.name}</p>
            </div>
        `).join('');
    }

    function searchAssets() {
        const val = document.getElementById('locker-search').value.toLowerCase();
        const filtered = allAssets.filter(a => a.name.toLowerCase().includes(val)).slice(0, 50);
        renderLocker(filtered);
    }

    // --- Tournaments ---
    async function loadTournaments() {
        // Fetch real tournaments
        const res = await fetch('https://fortnite-api.com/v2/news/br');
        const data = await res.json();
        const apiTourneys = data.data.motds.filter(m => m.title.toLowerCase().includes('cup') || m.title.toLowerCase().includes('tournament'));
        
        const grid = document.getElementById('tourney-grid');
        const total = [...customTourneys, ...apiTourneys];
        grid.innerHTML = total.map(t => `
            <div style="background:#000; border:2px solid var(--fn-blue); padding:10px;">
                <img src="${t.image || t.img}" style="width:100%; border-bottom:2px solid var(--fn-yellow)">
                <h3>${t.title || t.name}</h3>
                <p style="font-size:0.8rem; color:#aaa">${t.body || 'Scheduled Event'}</p>
            </div>
        `).join('');
    }

    function addTournament() {
        const name = document.getElementById('t-name').value;
        const img = document.getElementById('t-img').value;
        customTourneys.unshift({title: name, image: img});
        localStorage.setItem('fn_v8_tourneys', JSON.stringify(customTourneys));
        loadTournaments();
        hideModal('tourneyModal');
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }

    // Init
    generateReport();
    renderReports();
</script>

</body>
</html>
