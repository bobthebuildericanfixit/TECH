<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FN_INTERNAL // CORE_V11</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        :root {
            --fn-blue: #2183fb;
            --fn-yellow: #f8fd25;
            --fn-red: #ff4141;
            --status-green: #4caf50;
            --slant: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        body {
            margin: 0; background: radial-gradient(circle, #163a75 0%, #061021 100%);
            color: white; font-family: 'Anton', sans-serif; text-transform: uppercase;
            height: 100vh; overflow: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.95); display: flex; align-items: center;
            padding: 0 30px; border-bottom: 4px solid var(--fn-blue); height: 75px;
            justify-content: space-between;
        }

        .stat-box { text-align: center; border-right: 1px solid #333; padding: 0 20px; }
        .stat-val { color: var(--fn-yellow); font-size: 1.2rem; display: block; }
        .stat-lbl { font-size: 0.6rem; color: #888; }

        .nav-tab {
            background: #222; padding: 8px 15px; clip-path: var(--slant);
            cursor: pointer; border: none; color: #888; font-family: 'Anton'; margin: 0 2px;
        }
        .nav-tab.active { background: var(--fn-blue); color: white; }

        .container { padding: 20px; height: calc(100vh - 100px); }

        /* Server Toggle */
        .status-toggle { display: flex; align-items: center; gap: 10px; padding: 10px; background: #111; cursor: pointer; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--status-green); }
        .offline .status-dot { background: var(--fn-red); box-shadow: 0 0 10px var(--fn-red); }

        /* Grids & Feeds */
        .feed { background: rgba(0,0,0,0.6); border: 1px solid #222; height: 70vh; overflow-y: auto; padding: 10px; font-family: monospace; }
        .log-entry { padding: 8px; border-bottom: 1px solid #111; font-size: 0.85rem; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; height: 100%; }

        /* Notifications */
        #notify-wrap { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .toast { background: var(--fn-blue); padding: 15px; margin-top: 10px; clip-path: var(--slant); border-left: 5px solid var(--fn-yellow); animation: pop 0.3s ease; }
        @keyframes pop { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

        /* Gift Panel */
        .gift-box { background: #000; border: 2px solid var(--fn-blue); padding: 20px; }
        input, select { width: 100%; margin: 8px 0; padding: 12px; background: #111; color: white; border: 1px solid #333; box-sizing: border-box; }
        .btn-prime { background: var(--fn-yellow); color: #000; padding: 10px; width: 100%; border: none; cursor: pointer; font-family: 'Anton'; clip-path: var(--slant); }
    </style>
</head>
<body>

<header>
    <div style="display: flex;">
        <div class="stat-box"><span class="stat-lbl">LIVE PLAYERS</span><span class="stat-val" id="player-count">1,245,000</span></div>
        <div id="server-btn" class="status-toggle" onclick="toggleServer()">
            <div class="status-dot"></div>
            <span id="server-text">SERVERS: ONLINE</span>
        </div>
    </div>
    <nav>
        <button class="nav-tab active" onclick="switchTab('ops')">Operations</button>
        <button class="nav-tab" onclick="switchTab('gift')">Economy/Gift</button>
        <button class="nav-tab" onclick="switchTab('tournaments')">Tournaments</button>
        <button class="nav-tab" onclick="switchTab('support')">Support Tix</button>
    </nav>
    <div style="font-size: 0.7rem; color: #555;">ENVIRONMENT: PRODUCTION_LIVE</div>
</header>

<div class="container">
    <div id="view-ops" class="grid-3">
        <div>
            <h3 style="color:var(--fn-red)">Live Reports</h3>
            <div class="feed" id="report-feed"></div>
        </div>
        <div style="grid-column: span 2;">
            <h3>Active Match Instances</h3>
            <div class="feed" id="match-feed"></div>
        </div>
    </div>

    <div id="view-gift" style="display:none;">
        <div class="grid-3">
            <div class="gift-box">
                <h3>Gift Protocol</h3>
                <input type="text" id="g-user" placeholder="Recipient Username">
                <select id="g-type" onchange="toggleGiftType()">
                    <option value="item">Cosmetic Item</option>
                    <option value="vbucks">V-Bucks Currency</option>
                </select>
                <div id="item-search-wrap">
                    <input type="text" id="g-item" placeholder="Search Item Name...">
                </div>
                <div id="vbuck-wrap" style="display:none;">
                    <select id="g-vbucks">
                        <option value="1000">1,000 V-Bucks</option>
                        <option value="2800">2,800 V-Bucks</option>
                        <option value="5000">5,000 V-Bucks</option>
                        <option value="13500">13,500 V-Bucks</option>
                    </select>
                </div>
                <button class="btn-prime" onclick="sendGift()">Execute Transfer</button>
            </div>
        </div>
    </div>

    <div id="view-tournaments" style="display:none;">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-prime" style="width:auto" onclick="fetchFullTourneys()">Fetch All Official Events</button>
            <button class="btn-prime" style="width:auto; background:var(--fn-blue); color:white;" onclick="showAddTourney()">Add Custom Event</button>
        </div>
        <div id="tourney-grid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; overflow-y:auto; height:70vh;"></div>
    </div>

    <div id="view-support" style="display:none;">
        <h3>Open Help Tickets</h3>
        <div class="feed" id="support-feed"></div>
    </div>
</div>

<div id="notify-wrap"></div>

<script>
    let isOnline = true;
    let playerCount = 1245000;
    let reports = [];
    let matchInterval, playerInterval, reportInterval;

    // --- Tab Switching ---
    function switchTab(v) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        ['ops','gift','tournaments','support'].forEach(id => {
            document.getElementById('view-'+id).style.display = (id === v) ? (id==='ops'?'grid':'block') : 'none';
        });
        if(v === 'tournaments') fetchFullTourneys();
        if(v === 'support') generateSupport();
    }

    // --- Server Logic ---
    function toggleServer() {
        isOnline = !isOnline;
        const btn = document.getElementById('server-btn');
        const txt = document.getElementById('server-text');
        
        if(!isOnline) {
            btn.classList.add('offline');
            txt.innerText = "SERVERS: OFFLINE";
            notify("CRITICAL: Server shutdown initiated.");
            clearTimeout(reportInterval);
            document.getElementById('match-feed').innerHTML = "<div style='color:red; padding:20px;'>NO ACTIVE MATCHES - SERVERS OFFLINE</div>";
        } else {
            notify("RECOVERY: Servers coming back online in 6s...");
            setTimeout(() => {
                btn.classList.remove('offline');
                txt.innerText = "SERVERS: ONLINE";
                notify("All systems operational.");
                startFeeds();
            }, 6000);
        }
    }

    // --- Player Count Logic ---
    function updatePlayers() {
        const display = document.getElementById('player-count');
        if(!isOnline) {
            playerCount = Math.max(0, playerCount - Math.floor(Math.random() * 80000 + 20000));
        } else {
            if(playerCount < 1000000) {
                playerCount += Math.floor(Math.random() * 150000 + 50000);
            } else {
                playerCount += Math.floor(Math.random() * 10000 - 5000);
            }
        }
        display.innerText = playerCount.toLocaleString();
        setTimeout(updatePlayers, 1000);
    }

    // --- Feeds (Reports / Matches) ---
    function startFeeds() {
        if(!isOnline) return;

        // Reports
        const names = ["v_Shifted", "TZ_Ryz", "Not_Aqua", "Cold_Logic", "Lxsh_cc", "Faded_v"];
        const rFeed = document.getElementById('report-feed');
        const report = `
            <div class="log-entry">
                <span style="color:var(--fn-red)">[REPORT]</span> ${names[Math.floor(Math.random()*names.length)]} -> 
                ${["Aimbot", "Teaming", "Griefing"][Math.floor(Math.random()*3)]}
            </div>`;
        rFeed.insertAdjacentHTML('afterbegin', report);
        
        // Matches (Active Only)
        const mFeed = document.getElementById('match-feed');
        const modes = ["Ranked Solo", "Zero Build Squads", "Creative 2.0", "Ranked Duos", "Reload"];
        const match = `
            <div class="log-entry">
                <span style="color:var(--status-green)">[LIVE]</span> 
                ID: ${Math.floor(Math.random()*99999)} | Mode: ${modes[Math.floor(Math.random()*5)]} | 
                Players: ${Math.floor(Math.random()*20+80)}/100
            </div>`;
        mFeed.insertAdjacentHTML('afterbegin', match);
        if(mFeed.children.length > 20) mFeed.lastChild.remove();

        reportInterval = setTimeout(startFeeds, Math.random() * 3000 + 1000);
    }

    // --- Support Tickets ---
    function generateSupport() {
        const feed = document.getElementById('support-feed');
        const issues = [
            "My V-Bucks didn't show up after purchase!",
            "How do I join the FNCS Open Qualifiers?",
            "Someone is using a glitch in Creative.",
            "I accidentally bought a skin, can I refund?",
            "The game keeps crashing on my PS5."
        ];
        feed.innerHTML = issues.map(issue => `
            <div class="log-entry" style="border-left: 3px solid var(--fn-blue)">
                <strong style="color:var(--fn-blue)">USER_${Math.floor(Math.random()*999)}:</strong> ${issue}
                <br><button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--status-green); cursor:pointer; padding:0;">[RESOLVE TICKET]</button>
            </div>
        `).join('');
    }

    // --- Tournaments (Full Fetch) ---
    async function fetchFullTourneys() {
        const res = await fetch('https://fortnite-api.com/v2/news/br');
        const data = await res.json();
        const grid = document.getElementById('tourney-grid');
        // Filter news for anything competitive
        const items = data.data.motds;
        grid.innerHTML = items.map(t => `
            <div style="background:#000; border:1px solid var(--fn-blue);">
                <img src="${t.image}" style="width:100%">
                <div style="padding:10px; font-size:0.8rem;">
                    <div style="color:var(--fn-yellow)">PRIZE: $${Math.floor(Math.random()*10000+1000)}</div>
                    ${t.title}
                </div>
            </div>
        `).join('');
    }

    // --- Gifting Logic ---
    function toggleGiftType() {
        const type = document.getElementById('g-type').value;
        document.getElementById('item-search-wrap').style.display = type === 'item' ? 'block' : 'none';
        document.getElementById('vbuck-wrap').style.display = type === 'vbucks' ? 'block' : 'none';
    }

    function sendGift() {
        const user = document.getElementById('g-user').value;
        const type = document.getElementById('g-type').value;
        if(!user) return notify("Error: No recipient target.");
        
        if(type === 'vbucks') {
            const amt = document.getElementById('g-vbucks').value;
            notify(`SUCCESS: ${amt} V-Bucks granted to ${user}.`);
        } else {
            const item = document.getElementById('g-item').value;
            notify(`SUCCESS: ${item} gifted to ${user}.`);
        }
    }

    function notify(msg) {
        const wrap = document.getElementById('notify-wrap');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        wrap.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    // Init
    updatePlayers();
    startFeeds();
</script>

</body>
</html>
