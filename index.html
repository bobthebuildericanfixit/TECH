<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fortnite OG Admin | Elite Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        :root {
            --fn-blue: #2183fb;
            --fn-yellow: #f8fd25;
            --fn-purple: #a136f1;
            --slant: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        body {
            margin: 0; background: radial-gradient(circle, #163a75 0%, #061021 100%);
            color: white; font-family: 'Anton', sans-serif; text-transform: uppercase;
            height: 100vh; overflow: hidden;
        }

        /* Top Header & Account */
        header {
            background: rgba(0, 0, 0, 0.9); display: flex; align-items: center;
            padding: 0 40px; border-bottom: 4px solid var(--fn-blue); height: 70px;
            justify-content: space-between;
        }
        .nav-group { display: flex; gap: 10px; }
        .nav-tab {
            background: #313131; padding: 8px 30px; clip-path: var(--slant);
            cursor: pointer; border: none; color: #888; font-family: 'Anton';
        }
        .nav-tab.active { background: var(--fn-blue); color: white; }

        .account-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 5px 15px;
            border-radius: 4px; border-left: 4px solid var(--fn-yellow);
        }
        .status-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; }

        /* Banner & Buttons */
        .container { padding: 25px; }
        
        #rotation-timer {
            background: var(--fn-purple); color: white; padding: 12px;
            margin-bottom: 20px; display: none; clip-path: var(--slant);
            text-align: center; font-size: 1.2rem;
        }

        .action-bar { height: 60px; margin-bottom: 20px; }
        .btn-action {
            background: var(--fn-yellow); color: #000; padding: 10px 25px;
            clip-path: var(--slant); border: none; cursor: pointer; font-family: 'Anton';
            font-size: 1.1rem;
        }

        /* Content Grids */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; max-height: 70vh; overflow-y: auto; padding-bottom: 50px;
        }
        .card { background: rgba(0,0,0,0.7); border: 2px solid var(--fn-blue); position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 3px solid var(--fn-yellow); }
        .card-info { padding: 12px; }
        .price-tag { color: var(--fn-yellow); font-size: 1.2rem; }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: #12284c; border: 4px solid var(--fn-blue); width: 400px; padding: 25px; }
        input, select { width: 100%; margin: 10px 0; padding: 10px; background: #000; border: 1px solid var(--fn-blue); color: #fff; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--fn-blue); }
    </style>
</head>
<body>

<header>
    <div class="nav-group">
        <div style="font-size: 1.5rem; margin-right: 20px; color: var(--fn-blue);">EPIC_ADMIN</div>
        <button class="nav-tab active" onclick="switchTab('news')">News Feed</button>
        <button class="nav-tab" onclick="switchTab('shop')">Item Shop</button>
    </div>
    
    <div class="account-badge">
        <div class="status-dot"></div>
        <div>
            <div style="font-size: 0.7rem; color: #aaa;">LOGGED IN AS:</div>
            <div style="font-size: 1rem;">DEV_AUTH_01 (SUPERUSER)</div>
        </div>
    </div>
</header>

<div class="container">
    <div id="rotation-timer">
        ADMIN QUEUE: <span id="timer-display">--:--:--</span> | 
        GLOBAL REFRESH: <span id="global-timer">--:--:--</span>
    </div>

    <div class="action-bar">
        <button id="news-btn" class="btn-action" onclick="showModal('newsModal')">Post News</button>
        <button id="shop-btn" class="btn-action" style="display:none;" onclick="showModal('shopModal')">Add To Live Shop</button>
    </div>

    <div id="news-view" class="grid"></div>
    <div id="shop-view" class="grid" style="display:none;"></div>
</div>

<div id="newsModal" class="modal-overlay">
    <div class="modal">
        <h2>Post News Asset</h2>
        <input type="text" id="n-title" placeholder="News Headline">
        <input type="text" id="n-img" placeholder="Image URL">
        <input type="text" id="n-body" placeholder="Summary">
        <button class="btn-action" style="width:100%" onclick="addNews()">Publish News</button>
        <button onclick="hideModal('newsModal')" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<div id="shopModal" class="modal-overlay">
    <div class="modal">
        <h2>Shop Manual Override</h2>
        <input type="text" id="s-name" placeholder="Item Name">
        <input type="text" id="s-img" placeholder="Item Icon URL">
        <input type="number" id="s-price" placeholder="V-Bucks">
        <button class="btn-action" style="width:100%" onclick="queueShop()">Start 48h Countdown</button>
        <button onclick="hideModal('shopModal')" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    let newsList = JSON.parse(localStorage.getItem('fn_news')) || [];
    let customShop = JSON.parse(localStorage.getItem('fn_shop')) || [];

    // --- Tab Switching Logic ---
    function switchTab(tab) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        // Toggle Views
        document.getElementById('news-view').style.display = tab === 'news' ? 'grid' : 'none';
        document.getElementById('shop-view').style.display = tab === 'shop' ? 'grid' : 'none';

        // Toggle Buttons (The fix you asked for)
        document.getElementById('news-btn').style.display = tab === 'news' ? 'block' : 'none';
        document.getElementById('shop-btn').style.display = tab === 'shop' ? 'block' : 'none';

        if(tab === 'shop') renderShop();
    }

    // --- Modal Logic ---
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- News Logic ---
    async function initNews() {
        if(newsList.length === 0) {
            const res = await fetch('https://fortnite-api.com/v2/news/br');
            const data = await res.json();
            newsList = data.data.motds;
        }
        renderNews();
    }

    function renderNews() {
        document.getElementById('news-view').innerHTML = newsList.map(n => `
            <div class="card">
                <img src="${n.image || n.img}">
                <div class="card-info">
                    <h3>${n.title}</h3>
                    <p style="font-family:sans-serif; text-transform:none; font-size:0.8rem; color:#ccc;">${n.body}</p>
                </div>
            </div>
        `).join('');
    }

    function addNews() {
        const title = document.getElementById('n-title').value;
        const img = document.getElementById('n-img').value;
        const body = document.getElementById('n-body').value;
        newsList.unshift({ title, img, body });
        localStorage.setItem('fn_news', JSON.stringify(newsList));
        renderNews();
        hideModal('newsModal');
    }

    // --- Shop Logic & Countdown ---
    async function renderShop() {
        const shopView = document.getElementById('shop-view');
        const res = await fetch('https://fortnite-api.com/v2/shop/br');
        const data = await res.json();
        const liveItems = data.data.featured.entries.flatMap(e => e.items);

        const allItems = [...customShop, ...liveItems];

        shopView.innerHTML = allItems.map(item => `
            <div class="card">
                <img src="${item.images ? item.images.icon : item.img}">
                <div class="card-info">
                    <h3>${item.name}</h3>
                    <div class="price-tag">${item.price || '800'} V-BUCKS</div>
                </div>
            </div>
        `).join('');
    }

    function queueShop() {
        const name = document.getElementById('s-name').value;
        const img = document.getElementById('s-img').value;
        const price = document.getElementById('s-price').value;
        
        customShop.unshift({ name, img, price });
        localStorage.setItem('fn_shop', JSON.stringify(customShop));
        
        const target = new Date().getTime() + (48 * 60 * 60 * 1000);
        localStorage.setItem('rotation_end', target);
        
        renderShop();
        startTimers();
        hideModal('shopModal');
    }

    function startTimers() {
        const adminEnd = localStorage.getItem('rotation_end');
        if(adminEnd) document.getElementById('rotation-timer').style.display = 'block';

        setInterval(() => {
            const now = new Date().getTime();
            
            // 1. Admin Queue Timer
            if(adminEnd) {
                const dist = adminEnd - now;
                const h = Math.floor(dist / (1000 * 60 * 60));
                const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((dist % (1000 * 60)) / 1000);
                document.getElementById('timer-display').innerHTML = `${h}H ${m}M ${s}S`;
            }

            // 2. Fake Global Timer (Resetting every night at midnight)
            const midnight = new Date();
            midnight.setHours(24, 0, 0, 0);
            const globalDist = midnight.getTime() - now;
            const gh = Math.floor(globalDist / (1000 * 60 * 60));
            const gm = Math.floor((globalDist % (1000 * 60 * 60)) / (1000 * 60));
            const gs = Math.floor((globalDist % (1000 * 60)) / 1000);
            document.getElementById('global-timer').innerHTML = `${gh}H ${gm}M ${gs}S`;

        }, 1000);
    }

    // Init
    initNews();
    startTimers();
</script>

</body>
</html>
