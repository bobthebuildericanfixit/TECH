<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FN_ADMIN // INTERNAL_V6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        :root {
            --fn-blue: #2183fb;
            --fn-yellow: #f8fd25;
            --fn-red: #ff4141;
            --slant: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        body {
            margin: 0; background: radial-gradient(circle, #163a75 0%, #061021 100%);
            color: white; font-family: 'Anton', sans-serif; text-transform: uppercase;
            height: 100vh; overflow: hidden;
        }

        /* Top Bar */
        header {
            background: rgba(0, 0, 0, 0.95); display: flex; align-items: center;
            padding: 0 40px; border-bottom: 4px solid var(--fn-blue); height: 70px;
            justify-content: space-between;
        }
        .nav-tab {
            background: #313131; padding: 8px 25px; clip-path: var(--slant);
            cursor: pointer; border: none; color: #888; font-family: 'Anton'; margin: 0 5px;
        }
        .nav-tab.active { background: var(--fn-blue); color: white; }

        .container { padding: 30px; }

        /* Report Table Styling */
        .report-feed {
            background: rgba(0,0,0,0.8); border: 2px solid var(--fn-red);
            height: 75vh; overflow-y: auto; padding: 10px;
        }
        .report-entry {
            display: grid; grid-template-columns: 1fr 2fr 1fr 1fr;
            background: #1a1a1a; margin-bottom: 5px; padding: 15px;
            border-left: 5px solid var(--fn-red); animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .status-live { color: #4caf50; font-size: 0.8rem; letter-spacing: 2px; }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #12284c; border: 4px solid var(--fn-blue);
            width: 500px; padding: 30px; position: relative;
        }

        /* Common Grid */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; max-height: 70vh; overflow-y: auto;
        }
        .card { background: #000; border: 2px solid #333; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-label { padding: 5px; font-size: 0.8rem; text-align: center; }

        /* Buttons */
        .btn-action {
            background: var(--fn-yellow); color: black; padding: 10px 20px;
            clip-path: var(--slant); border: none; cursor: pointer; font-family: 'Anton';
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <div style="color: var(--fn-blue); font-size: 1.5rem; margin-right: 30px;">INTERNAL_DASHBOARD</div>
        <button class="nav-tab active" onclick="switchTab('reports')">Live Reports</button>
        <button class="nav-tab" onclick="switchTab('locker')">Dev Locker</button>
        <button class="nav-tab" onclick="switchTab('news')">News Assets</button>
    </div>
    
    <div style="text-align: right;">
        <div class="status-live">● SYSTEM ACTIVE</div>
        <div style="font-size: 0.9rem;">ADMIN: AUTH_DEV_99</div>
    </div>
</header>

<div class="container">
    <div id="view-reports">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <h2 style="color: var(--fn-red);">Incoming Infraction Reports</h2>
            <div id="update-timer" style="color: var(--fn-yellow);">NEXT SYNC IN: 10s</div>
        </div>
        <div class="report-feed" id="report-container">
            </div>
    </div>

    <div id="view-locker" style="display:none;">
        <div style="margin-bottom: 20px; display:flex; gap: 10px;">
            <button class="btn-action" onclick="openPopup('lockerPopup')">Open Asset Registry</button>
        </div>
        <div id="locker-grid" class="grid"></div>
    </div>

    <div id="view-news" style="display:none;">
        <button class="btn-action" style="margin-bottom:20px;" onclick="openPopup('newsPopup')">Add News Slide</button>
        <div id="news-grid" class="grid"></div>
    </div>
</div>

<div id="newsPopup" class="modal-overlay">
    <div class="modal-content">
        <h2>Push News Slide</h2>
        <input type="text" id="n-title" placeholder="HEADLINE" style="width:100%; margin: 10px 0; background: #000; color: #fff; border: 1px solid var(--fn-blue); padding: 10px;">
        <textarea id="n-body" placeholder="DESCRIPTION" style="width:100%; height:80px; background: #000; color: #fff; border: 1px solid var(--fn-blue); padding: 10px;"></textarea>
        <button class="btn-action" style="width:100%; margin-top:10px;" onclick="addNews()">PUBLISH TO CDN</button>
        <button onclick="closePopup('newsPopup')" style="color:red; background:none; border:none; margin-top:10px; width:100%; cursor:pointer;">DISCARD</button>
    </div>
</div>

<script>
    const reportReasons = ["Cheating/Hacking", "Toxic Behavior", "Stream Sniping", "Inappropriate Name", "Teaming"];
    const fakeNames = ["FaZe_Kyl3", "OG_Bugha_Clone", "ShadowWalker77", "NoobSlayer2026", "Elite_Sniper", "CuddleTeamLeader_9", "V-BucksScammer", "DefaultSkinPro"];
    
    let reports = [];
    let countdown = 10;

    // --- Tab Switcher ---
    function switchTab(view) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('view-reports').style.display = view === 'reports' ? 'block' : 'none';
        document.getElementById('view-locker').style.display = view === 'locker' ? 'block' : 'none';
        document.getElementById('view-news').style.display = view === 'news' ? 'block' : 'none';
    }

    // --- Reports Logic ---
    function generateReport() {
        const name = fakeNames[Math.floor(Math.random() * fakeNames.length)] + "_" + Math.floor(Math.random() * 999);
        const reporter = fakeNames[Math.floor(Math.random() * fakeNames.length)];
        const reason = reportReasons[Math.floor(Math.random() * reportReasons.length)];
        const timestamp = new Date().toLocaleTimeString();

        const reportHtml = `
            <div class="report-entry">
                <span style="color:var(--fn-yellow)">${timestamp}</span>
                <span>TARGET: <strong>${name}</strong></span>
                <span style="color:var(--fn-red)">${reason}</span>
                <button class="btn-action" style="padding:2px 10px; font-size:0.7rem;" onclick="this.parentElement.remove()">BAN USER</button>
            </div>
        `;

        const container = document.getElementById('report-container');
        container.insertAdjacentHTML('afterbegin', reportHtml);
    }

    // --- Update Loop ---
    setInterval(() => {
        countdown--;
        if(countdown <= 0) {
            generateReport();
            countdown = 10;
        }
        document.getElementById('update-timer').innerText = `NEXT SYNC IN: ${countdown}s`;
    }, 1000);

    // --- Popup Logic ---
    function openPopup(id) { document.getElementById(id).style.display = 'flex'; }
    function closePopup(id) { document.getElementById(id).style.display = 'none'; }

    function addNews() {
        const title = document.getElementById('n-title').value;
        alert(`BROADCAST SUCCESS: "${title}" is now live on the news feed.`);
        closePopup('newsPopup');
    }

    // Initial load
    for(let i=0; i<5; i++) generateReport();
</script>

</body>
</html>
